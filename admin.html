<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | PAWS-N-TAILS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-100 font-sans text-slate-800">

    <nav class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-10 shadow-sm">
        <div class="flex items-center gap-3">
            <img src="Logo.jpg" alt="Logo" class="h-10 w-auto rounded" onerror="this.style.display='none'">
            <h1 class="text-xl font-bold tracking-tight">Admin Dashboard</h1>
        </div>
        <a href="index.html" class="text-sm font-medium text-slate-500 hover:text-blue-600 transition">View Website <i class="fa-solid fa-external-link ml-1"></i></a>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-6 flex flex-col md:flex-row gap-4">
            <div class="flex-1 relative">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-slate-400"></i>
                <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Search by name, email or clinic..." 
                       class="w-full pl-10 pr-4 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <select id="filterType" onchange="filterTable()" class="px-4 py-2 border border-slate-300 rounded-lg outline-none bg-white">
                <option value="all">All Types</option>
                <option value="member">Member</option>
                <option value="admin">Admin</option>
                <option value="staff">Staff</option>
            </select>

            <select id="filterStatus" onchange="filterTable()" class="px-4 py-2 border border-slate-300 rounded-lg outline-none bg-white">
                <option value="all">All Status</option>
                <option value="pending">Pending</option>
                <option value="approved">Approved</option>
            </select>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="p-4 font-semibold text-slate-600">Practitioner</th>
                            <th class="p-4 font-semibold text-slate-600">Clinic & Location</th>
                            <th class="p-4 font-semibold text-slate-600">Type</th>
                            <th class="p-4 font-semibold text-slate-600">Status</th>
                            <th class="p-4 font-semibold text-slate-600">Active</th>
                            <th class="p-4 font-semibold text-slate-600 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = 'https://vxzixltgnuvximbbttxx.supabase.co';
        const SB_KEY = 'sb_publishable_TyLXdjnySjpRxUS-vBk3MQ_mAq1UELd';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let allApplications = [];

        async function loadData() {
            const { data, error } = await supabaseClient.from('applications').select('*').order('created_at', { ascending: false });
            if (!error) {
                allApplications = data;
                renderTable(data);
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = data.length ? "" : "<tr><td colspan='6' class='p-10 text-center text-slate-400'>No records found</td></tr>";
            
            data.forEach(app => {
                const isApproved = app.status === 'approved';
                const statusColor = isApproved ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700';
                const activeColor = app.is_active ? 'bg-blue-100 text-blue-700' : 'bg-slate-100 text-slate-500';

                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="p-4">
                            <div class="font-bold">${app.title} ${app.first_name} ${app.last_name}</div>
                            <div class="text-xs text-slate-500">${app.email}</div>
                        </td>
                        <td class="p-4 text-sm">
                            <div class="font-medium">${app.clinic_name}</div>
                            <div class="text-xs text-slate-400">${app.city}, ${app.state}</div>
                        </td>
                        <td class="p-4"><span class="px-2 py-1 rounded-md text-xs font-bold bg-slate-100 uppercase">${app.user_type}</span></td>
                        <td class="p-4"><span class="px-2 py-1 rounded-md text-xs font-bold uppercase ${statusColor}">${app.status}</span></td>
                        <td class="p-4"><span class="px-2 py-1 rounded-md text-xs font-bold uppercase ${activeColor}">${app.is_active ? 'Active' : 'Inactive'}</span></td>
                        <td class="p-4">
                            <div class="flex justify-center gap-2">
                                <button onclick="toggleStatus('${app.id}', '${app.status}')" class="px-3 py-1 text-xs font-bold rounded border ${isApproved ? 'border-amber-500 text-amber-600 hover:bg-amber-50' : 'border-green-500 text-green-600 hover:bg-green-50'}">
                                    ${isApproved ? 'Revoke' : 'Approve'}
                                </button>
                                <button onclick="deleteRecord('${app.id}')" class="p-1 text-slate-400 hover:text-red-600 transition"><i class="fa-solid fa-trash-can"></i></button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        }

        async function toggleStatus(id, currentStatus) {
            const newStatus = currentStatus === 'pending' ? 'approved' : 'pending';
            const isActive = newStatus === 'approved'; // Auto-activate if approved
            const { error } = await supabaseClient.from('applications').update({ status: newStatus, is_active: isActive }).eq('id', id);
            if (!error) loadData();
        }

        async function deleteRecord(id) {
            if(confirm("Are you sure you want to delete this application?")) {
                const { error } = await supabaseClient.from('applications').delete().eq('id', id);
                if (!error) loadData();
            }
        }

        function filterTable() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const type = document.getElementById('filterType').value;
            const status = document.getElementById('filterStatus').value;

            const filtered = allApplications.filter(app => {
                const matchesSearch = app.first_name.toLowerCase().includes(query) || 
                                    app.last_name.toLowerCase().includes(query) || 
                                    app.clinic_name.toLowerCase().includes(query);
                const matchesType = type === 'all' || app.user_type === type;
                const matchesStatus = status === 'all' || app.status === status;
                return matchesSearch && matchesType && matchesStatus;
            });
            renderTable(filtered);
        }

        loadData();
    </script>
</body>
</html>
