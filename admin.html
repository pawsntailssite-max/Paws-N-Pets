<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Manage Applications</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { padding: 20px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f8f9fa; }
        .approve-btn { background-color: #28a745; color: white; border: none; padding: 8px 16px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .approve-btn:hover { background-color: #218838; }
        #loading { font-style: italic; color: #666; }
    </style>
</head>
<body>
    <h1>Pending Veterinarian Applications</h1>
    <div id="loading">Connecting to database...</div>
    
    <table id="appTable" style="display:none;">
        <thead>
            <tr>
                <th>Clinic Name</th>
                <th>Email</th>
                <th>Mobile</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        const SB_URL = 'https://vxzixltgnuvximbbttxx.supabase.co';
        const SB_KEY = 'sb_publishable_TyLXdjnySjpRxUS-vBk3MQ_mAq1UELd';
        
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        async function fetchApplications() {
            const { data, error } = await supabaseClient
                .from('applications')
                .select('*')
                .eq('status', 'pending');

            if (error) {
                alert("Error fetching data: " + error.message);
                return;
            }

            const tableBody = document.getElementById('tableBody');
            const loading = document.getElementById('loading');
            const table = document.getElementById('appTable');

            tableBody.innerHTML = "";
            
            if (data && data.length > 0) {
                data.forEach(app => {
                    tableBody.innerHTML += `
                        <tr>
                            <td>${app.clinic_name}</td>
                            <td>${app.email}</td>
                            <td>${app.mobile_number}</td>
                            <td><button class="approve-btn" onclick="approveVet('${app.id}', '${app.email}')">Approve</button></td>
                        </tr>
                    `;
                });
            } else {
                tableBody.innerHTML = "<tr><td colspan='4'>No pending applications found.</td></tr>";
            }

            loading.style.display = "none";
            table.style.display = "table";
        }

        async function approveVet(id, email) {
            console.log("Starting approval for:", email);

            // 1. Update the row in Supabase
            const { error: updateError } = await supabaseClient
                .from('applications')
                .update({ status: 'approved' })
                .eq('id', id);

            if (updateError) {
                alert("Update failed: " + updateError.message);
                console.error(updateError);
                return;
            }

            // 2. The NEW alert message
            alert("SUCCESS!\n\nApplication for " + email + " is now APPROVED.\n\nPlease go to Supabase Dashboard > Auth > Add User to send their invite.");
            
            // 3. Refresh list
            fetchApplications();
        }

        // Initial load
        fetchApplications();
    </script>
</body>
</html>
