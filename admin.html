<script>
        // --- CONFIGURATION ---
        const SB_URL = 'https://vxzixltgnuvximbbttxx.supabase.co';
        const SB_KEY = 'sb_publishable_TyLXdjnySjpRxUS-vBk3MQ_mAq1UELd';
        
        // Template IDs (Safe to leave in frontend)
        const APPROVAL_ID = 1;  // MEMBERSHIP APPROVAL
        const REVOKE_ID = 2;    // MEMBERSHIP REVOKED
        // ---------------------

        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        let allApplications = [];

        async function loadData() {
            const { data, error } = await supabaseClient.from('applications').select('*').order('created_at', { ascending: false });
            if (!error) { allApplications = data; renderTable(data); }
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = data.length ? "" : "<tr><td colspan='3' class='p-10 text-center text-slate-400 text-sm'>No records found</td></tr>";
            data.forEach(app => {
                const isApproved = app.status === 'approved';
                const statusBtnClass = isApproved ? 'border-amber-500 text-amber-600 hover:bg-amber-50' : 'border-green-600 text-green-600 hover:bg-green-50';
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition border-b border-slate-100 text-slate-700">
                        <td class="p-4">
                            <div class="font-bold text-slate-900">${app.title} ${app.first_name} ${app.last_name} <span class="px-1.5 py-0.5 rounded text-[9px] bg-slate-200 text-slate-600 uppercase font-black ml-1">${app.user_type}</span></div>
                            <div class="text-[11px] text-slate-500 italic font-medium">${app.email}</div>
                        </td>
                        <td class="p-4">
                            <div class="text-sm font-semibold text-slate-700">${app.clinic_name}</div>
                            <div class="flex gap-2 mt-1">
                                <span class="text-[9px] font-bold uppercase px-1.5 py-0.5 rounded border ${isApproved ? 'border-green-200 bg-green-50 text-green-700':'border-amber-200 bg-amber-50 text-amber-700'}">${app.status}</span>
                                <span class="text-[9px] font-bold uppercase px-1.5 py-0.5 rounded border ${app.is_active ? 'border-blue-200 bg-blue-50 text-blue-700':'border-slate-200 bg-slate-50 text-slate-400'}">${app.is_active ? 'ACTIVE' : 'INACTIVE'}</span>
                            </div>
                        </td>
                        <td class="p-4">
                            <div class="flex justify-center items-center gap-3">
                                <button onclick="toggleQuickStatus('${app.id}', '${app.status}')" class="px-3 py-1 text-[10px] font-black uppercase rounded border transition-all ${statusBtnClass}">
                                    ${isApproved ? 'Revoke' : 'Approve'}
                                </button>
                                <button onclick="openEditModal('${app.id}')" class="text-blue-500 hover:text-blue-700 text-lg"><i class="fa-solid fa-pen-to-square"></i></button>
                                <button onclick="deleteRecord('${app.id}')" class="text-slate-200 hover:text-red-500 text-lg"><i class="fa-solid fa-trash-can"></i></button>
                            </div>
                        </td>
                    </tr>`;
            });
        }

        async function toggleQuickStatus(id, current) {
            const next = current === 'pending' ? 'approved' : 'pending';
            const app = allApplications.find(a => a.id === id);
            
            const { error } = await supabaseClient.from('applications').update({ 
                status: next, 
                is_active: (next === 'approved') 
            }).eq('id', id);

            if (!error) {
                if (next === 'approved') sendEmail(app, 'approval');
                else sendEmail(app, 'revoke');
                loadData();
            }
        }

        // --- SECURE SECURE EMAIL FUNCTION ---
        async function sendEmail(app, type) {
            const templateId = (type === 'approval') ? APPROVAL_ID : REVOKE_ID;
            const combinedFullName = `${app.title} ${app.first_name} ${app.last_name}`;

            try {
                // Call the secure Supabase Edge Function instead of Brevo directly
                const { data, error } = await supabaseClient.functions.invoke('send-email', {
                    body: { 
                        email: app.email, 
                        name: combinedFullName, 
                        templateId: templateId 
                    }
                });

                if (error) {
                    console.error('Error invoking function:', error);
                } else {
                    console.log(`Success: ${type} email triggered securely for ${app.email}`);
                }
            } catch (err) {
                console.error('Network error while triggering email:', err);
            }
        }

        function openEditModal(id) {
            const app = allApplications.find(a => a.id === id);
            document.getElementById('editId').value = app.id;
            document.getElementById('editTitle').value = app.title;
            document.getElementById('editFirstName').value = app.first_name;
            document.getElementById('editLastName').value = app.last_name;
            document.getElementById('editEmail').value = app.email;
            document.getElementById('editMobile').value = app.mobile_number;
            document.getElementById('editDob').value = app.dob;
            document.getElementById('editClinicName').value = app.clinic_name;
            document.getElementById('editAddress').value = app.address;
            document.getElementById('editCity').value = app.city;
            document.getElementById('editState').value = app.state;
            document.getElementById('editPincode').value = app.pincode;
            document.getElementById('editUserType').value = app.user_type;
            document.getElementById('editExpiry').value = app.expiry_date;
            document.getElementById('editStatus').value = app.status;
            document.getElementById('editIsActive').value = String(app.is_active);
            document.getElementById('editModal').style.display = 'block';
        }

        function closeModal() { document.getElementById('editModal').style.display = 'none'; }

        async function saveEdit() {
            const id = document.getElementById('editId').value;
            const updateData = {
                title: document.getElementById('editTitle').value,
                first_name: document.getElementById('editFirstName').value,
                last_name: document.getElementById('editLastName').value,
                email: document.getElementById('editEmail').value,
                mobile_number: document.getElementById('editMobile').value,
                dob: document.getElementById('editDob').value || null,
                clinic_name: document.getElementById('editClinicName').value,
                address: document.getElementById('editAddress').value,
                city: document.getElementById('editCity').value,
                state: document.getElementById('editState').value,
                pincode: document.getElementById('editPincode').value,
                user_type: document.getElementById('editUserType').value,
                expiry_date: document.getElementById('editExpiry').value || null,
                status: document.getElementById('editStatus').value,
                is_active: document.getElementById('editIsActive').value === 'true'
            };
            const { error } = await supabaseClient.from('applications').update(updateData).eq('id', id);
            if (!error) { closeModal(); loadData(); }
        }

        async function deleteRecord(id) {
            if(confirm("Permanently delete this record? This cannot be undone.")) {
                await supabaseClient.from('applications').delete().eq('id', id);
                loadData();
            }
        }

        function filterTable() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const type = document.getElementById('filterType').value;
            const status = document.getElementById('filterStatus').value;
            const active = document.getElementById('filterActive').value;
            const filtered = allApplications.filter(app => {
                const searchStr = (app.first_name + " " + app.last_name + " " + app.clinic_name + " " + app.email).toLowerCase();
                return searchStr.includes(query) && (type === 'all' || app.user_type === type) && (status === 'all' || app.status === status) && (active === 'all' || String(app.is_active) === active);
            });
            renderTable(filtered);
        }

        loadData();
    </script>
