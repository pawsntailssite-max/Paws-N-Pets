<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | PAWS-N-TAILS</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Hidden by default for security */
        body { display: none; }
        .modal { display: none; position: fixed; z-index: 50; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.5); }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-800">

    <nav class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-10 shadow-sm">
        <div class="flex items-center gap-3">
            <img src="Logo.jpg" alt="Logo" class="h-10 w-auto rounded" onerror="this.style.display='none'">
            <h1 class="text-xl font-bold tracking-tight text-slate-900">PAWS-N-TAILS Admin</h1>
        </div>
        
        <div class="flex items-center gap-6">
            <div id="adminControls" class="flex items-center gap-3 hidden">
                <span id="adminName" class="text-xs font-bold text-slate-500 uppercase"></span>
                <button onclick="handleLogout()" class="text-[10px] font-bold bg-slate-100 border border-slate-200 px-3 py-1.5 rounded hover:bg-red-50 hover:text-red-600 hover:border-red-200 transition-all uppercase">Logout</button>
            </div>
            <a href="index.html" class="text-sm font-medium text-slate-500 hover:text-blue-600 transition">View Website</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-6 flex flex-wrap gap-4 text-sm">
            <div class="flex-1 min-w-[250px] relative">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-slate-400"></i>
                <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Search name, email, clinic..." class="w-full pl-10 pr-4 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <select id="filterType" onchange="filterTable()" class="px-4 py-2 border border-slate-300 rounded-lg outline-none bg-white"><option value="all">All Types</option><option value="member">Member</option><option value="staff">Staff</option><option value="admin">Admin</option></select>
            <select id="filterStatus" onchange="filterTable()" class="px-4 py-2 border border-slate-300 rounded-lg outline-none bg-white"><option value="all">Status: All</option><option value="pending">Pending</option><option value="approved">Approved</option></select>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-50 border-b border-slate-200">
                    <tr>
                        <th class="p-4 font-semibold text-slate-600 uppercase text-xs">Practitioner</th>
                        <th class="p-4 font-semibold text-slate-600 uppercase text-xs">Clinic Info</th>
                        <th class="p-4 font-semibold text-slate-600 uppercase text-xs text-center">Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-100">
                    <tr><td colspan="3" class="p-10 text-center text-slate-400 italic">Initializing security check...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <div id="editModal" class="modal">
        <div class="bg-white max-w-xl mx-auto my-10 rounded-2xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="px-8 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h2 class="text-xl font-bold text-slate-800">Edit Profile</h2>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 text-2xl">&times;</button>
            </div>
            <div class="p-8 overflow-y-auto space-y-4">
                <form id="editForm" class="space-y-4">
                    <input type="hidden" id="editId">
                    <div><label class="block text-xs font-bold uppercase text-slate-500 mb-1">First Name</label><input type="text" id="editFirstName" class="w-full p-2 border rounded text-sm"></div>
                    <div><label class="block text-xs font-bold uppercase text-slate-500 mb-1">Last Name</label><input type="text" id="editLastName" class="w-full p-2 border rounded text-sm"></div>
                    <div><label class="block text-xs font-bold uppercase text-blue-600 mb-1">User Type</label><select id="editUserType" class="w-full p-2 border rounded text-sm font-bold bg-blue-50 border-blue-200"><option value="member">Member</option><option value="staff">Staff</option><option value="admin">Admin</option></select></div>
                    <div><label class="block text-xs font-bold uppercase text-blue-600 mb-1">Status</label><select id="editStatus" class="w-full p-2 border rounded text-sm font-bold bg-blue-50 border-blue-200"><option value="pending">Pending</option><option value="approved">Approved</option></select></div>
                </form>
            </div>
            <div class="p-6 border-t bg-slate-50 flex justify-end gap-3">
                <button onclick="closeModal()" class="px-4 py-2 text-sm font-bold text-slate-500">Cancel</button>
                <button onclick="saveEdit()" class="px-6 py-2 bg-blue-600 text-white rounded-lg text-sm font-bold shadow-md">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://vxzixltgnuvximbbttxx.supabase.co';
        const SB_KEY = 'sb_publishable_TyLXdjnySjpRxUS-vBk3MQ_mAq1UELd';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        let allApplications = [];

        // --- AUTHENTICATION GATEKEEPER ---
        async function checkAccess() {
            try {
                const { data: { session }, error: sessionError } = await supabaseClient.auth.getSession();

                // 1. Not Logged In
                if (!session || sessionError) {
                    alert("Unauthorized access. Please log in from the main portal.");
                    window.location.replace("index.html");
                    return;
                }

                // 2. Fetch User Data
                const { data: profile, error: profileError } = await supabaseClient
                    .from('applications')
                    .select('status, user_type, is_active, first_name')
                    .eq('email', session.user.email)
                    .single();

                // 3. Permission Checks
                if (profileError || !profile) {
                    alert("Profile not found. Returning to home.");
                    await supabaseClient.auth.signOut();
                    window.location.replace("index.html");
                    return;
                }

                const isAdmin = (profile.user_type === 'admin');
                const isApproved = (profile.status === 'approved');
                const isActive = (profile.is_active === true);

                if (isAdmin && isApproved && isActive) {
                    // SUCCESS: Reveal the page
                    document.body.style.display = 'block';
                    document.getElementById('adminControls').classList.remove('hidden');
                    document.getElementById('adminName').innerText = `Admin: ${profile.first_name}`;
                    loadData();
                } else {
                    // FAIL: Not an admin
                    alert("Access Denied: You do not have administrator privileges.");
                    await supabaseClient.auth.signOut();
                    window.location.replace("index.html");
                }
            } catch (err) {
                console.error("Auth Exception:", err);
                window.location.replace("index.html");
            }
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
            window.location.replace("index.html");
        }

        // --- DATA LOADING ---
        async function loadData() {
            const { data, error } = await supabaseClient.from('applications').select('*').order('created_at', { ascending: false });
            if (!error) {
                allApplications = data;
                renderTable(data);
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = data.length ? "" : "<tr><td colspan='3' class='p-10 text-center text-slate-400'>No records found</td></tr>";
            data.forEach(app => {
                const isApproved = app.status === 'approved';
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 border-b border-slate-100 transition">
                        <td class="p-4">
                            <div class="font-bold text-slate-900">${app.first_name} ${app.last_name}</div>
                            <div class="text-[11px] text-slate-400 uppercase font-black">${app.user_type}</div>
                        </td>
                        <td class="p-4">
                            <div class="text-sm font-semibold text-slate-700">${app.clinic_name || 'N/A'}</div>
                            <div class="text-[10px] font-bold text-slate-400">${app.email}</div>
                        </td>
                        <td class="p-4 text-center">
                            <button onclick="openEditModal('${app.id}')" class="text-blue-500 hover:text-blue-700 mx-2"><i class="fa-solid fa-pen-to-square"></i></button>
                            <button onclick="deleteRecord('${app.id}')" class="text-slate-300 hover:text-red-500 mx-2"><i class="fa-solid fa-trash-can"></i></button>
                        </td>
                    </tr>`;
            });
        }

        function openEditModal(id) {
            const app = allApplications.find(a => a.id === id);
            document.getElementById('editId').value = app.id;
            document.getElementById('editFirstName').value = app.first_name;
            document.getElementById('editLastName').value = app.last_name;
            document.getElementById('editUserType').value = app.user_type;
            document.getElementById('editStatus').value = app.status;
            document.getElementById('editModal').style.display = 'block';
        }

        function closeModal() { document.getElementById('editModal').style.display = 'none'; }

        async function saveEdit() {
            const id = document.getElementById('editId').value;
            const updateData = {
                first_name: document.getElementById('editFirstName').value,
                last_name: document.getElementById('editLastName').value,
                user_type: document.getElementById('editUserType').value,
                status: document.getElementById('editStatus').value
            };
            const { error } = await supabaseClient.from('applications').update(updateData).eq('id', id);
            if (!error) { closeModal(); loadData(); }
        }

        async function deleteRecord(id) {
            if(confirm("Are you sure?")) {
                const { error } = await supabaseClient.from('applications').delete().eq('id', id);
                if (!error) loadData();
            }
        }

        function filterTable() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const type = document.getElementById('filterType').value;
            const filtered = allApplications.filter(app => {
                const match = (app.first_name + app.last_name + app.email).toLowerCase().includes(query);
                const matchType = (type === 'all' || app.user_type === type);
                return match && matchType;
            });
            renderTable(filtered);
        }

        // Run security check on load
        checkAccess();
    </script>
</body>
</html>
