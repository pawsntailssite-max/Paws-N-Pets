<div class="md:col-span-2 text-blue-600 font-bold text-xs uppercase tracking-widest mt-4 border-t pt-4">Admin Management</div>

<div class="md:col-span-2">
    <label class="block text-[10px] font-bold uppercase text-slate-400 mb-1">Registered Email (Account ID)</label>
    <input type="email" id="editEmail" class="w-full p-2 border rounded border-slate-200 bg-slate-50 text-slate-500 text-sm outline-none" readonly>
</div>

<div>
    <label class="block text-[10px] font-bold uppercase text-slate-400 mb-1">User Type</label>
    <select id="editUserType" class="w-full p-2 border rounded border-slate-300 bg-white text-sm">
        <option value="member">Member</option><option value="staff">Staff</option><option value="admin">Admin</option>
    </select>
</div>
