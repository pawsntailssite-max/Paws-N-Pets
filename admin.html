<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | PAWS-N-TAILS</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* SECURITY GATEKEEPER: Page is hidden until verification */
        body { display: none; }
        .modal { display: none; position: fixed; z-index: 50; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
        #modalContent::-webkit-scrollbar { width: 6px; }
        #modalContent::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-800">

    <nav class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-10 shadow-sm">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg text-white"><i class="fa-solid fa-paw text-xl"></i></div>
            <h1 class="text-xl font-bold tracking-tight text-slate-900">PAWS-N-TAILS Admin</h1>
        </div>
        <div id="adminControls" class="flex items-center gap-6 hidden">
            <a href="dashboard.html" class="text-xs font-bold text-blue-600 hover:text-blue-800 transition-colors uppercase tracking-wider">Back to Dashboard</a>
            <span id="adminName" class="text-xs font-bold text-slate-500 uppercase tracking-widest border-l pl-6 border-slate-200"></span>
            <button onclick="handleLogout()" class="text-[10px] font-bold bg-slate-100 border border-slate-200 px-3 py-1.5 rounded hover:bg-red-50 hover:text-red-600 transition-all uppercase">Logout</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-6 flex flex-wrap gap-4 text-sm items-center">
            <div class="flex-1 min-w-[250px] relative">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-slate-400"></i>
                <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Search name, email, clinic..." class="w-full pl-10 pr-4 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <select id="filterType" onchange="filterTable()" class="px-4 py-2 border border-slate-300 rounded-lg outline-none bg-white font-medium">
                <option value="all">All Types</option>
                <option value="member">Member</option>
                <option value="staff">Staff</option>
                <option value="admin">Admin</option>
            </select>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-50 border-b border-slate-200">
                    <tr>
                        <th class="p-4 font-semibold text-slate-600 uppercase text-xs">Practitioner</th>
                        <th class="p-4 font-semibold text-slate-600 uppercase text-xs">Clinic Info</th>
                        <th class="p-4 font-semibold text-slate-600 uppercase text-xs">Status</th>
                        <th class="p-4 font-semibold text-slate-600 uppercase text-xs text-center">Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-100">
                    <tr><td colspan="4" class="p-10 text-center text-slate-400 italic">Verifying Admin Credentials...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <div id="editModal" class="modal">
        <div class="bg-white max-w-5xl mx-auto my-10 rounded-2xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="px-8 py-5 border-b border-slate-100 flex justify-between items-center bg-white sticky top-0 z-20">
                <div class="flex items-center gap-4">
                    <img id="modalProfilePicPreview" src="" class="w-14 h-14 rounded-full object-cover border-2 border-blue-100 shadow-sm" onerror="this.src='https://via.placeholder.com/150?text=No+Pic'">
                    <div>
                        <h2 class="text-xl font-bold text-slate-800 leading-tight">Master Edit Profile</h2>
                        <p id="modalSubId" class="text-[10px] text-slate-400 font-mono"></p>
                    </div>
                </div>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 text-2xl transition-transform hover:scale-110">&times;</button>
            </div>

            <div id="modalContent" class="p-8 overflow-y-auto bg-slate-50/50">
                <div class="mb-8 bg-white p-6 rounded-xl border-2 border-dashed border-slate-200 text-center">
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-2">Update Profile Photo (Storage: profiles)</label>
                    <input type="file" id="fileUpload" accept="image/*" class="text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
                </div>

                <form id="editForm" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <input type="hidden" id="editId">
                    
                    <div><label class="block text-[10px] font-bold uppercase text-slate-400 mb-1">1. Title</label><input type="text" id="editTitle" class="w-full p-2 border rounded text-sm bg-white outline-blue-500"></div>
                    <div><label class="block text-[10px] font-bold uppercase text-slate-400 mb-1">2. First Name</label><input type="text" id="editFirstName" class="w-full p-2 border rounded text-sm bg-white outline-blue-500"></div>
                    <div><label class="block text-[10px] font-bold uppercase text-slate-400 mb-1">3. Last Name</label><input type="text" id="editLastName" class="w-full p-2 border rounded text-sm bg-white outline-blue-500"></div>
                    
                    <div><label class="block text-[10px] font-bold uppercase text-slate-400 mb-1">4. Email (ID)</label><input type="email" id="editEmail" disabled class="w-full p-2 border rounded text-sm bg-slate-200 text-slate-500 cursor-not-allowed"></div>
                    <div><label class="block text-[10px] font-bold uppercase text-slate-400 mb-1">5. Mobile Number</label><input type="text" id="editMobile" class="w-full p-2 border rounded text-sm bg-white outline-blue-500"></div>
                    <div><label class="block text-[10px] font-bold uppercase text-slate-400 mb-1">6. Date of Birth</label><input type="date" id="editDob" class="w-full p-2 border rounded text-sm bg-white outline-blue-500"></div>
                    
                    <div class="md:col-span-3"><label class="block text-[10px] font-bold uppercase text-slate-400 mb-1">7. Business Name</label><input type="text" id="editClinic" class="w-full p-2 border rounded text-sm bg-white outline-blue-500"></div>
                    <div class="md:col-span-3"><label class="block text-[10px] font-bold uppercase text-slate-400 mb-1">8. Address</label><input type="text" id="editAddress" class="w-full p-2 border rounded text-sm bg-white outline-blue-500"></div>
                    
                    <div><label class="block text-[10px] font-bold uppercase text-slate-400 mb-1">9. City</label><input type="text" id="editCity" class="w-full p-2 border rounded text-sm bg-white outline-blue-500"></div>
                    <div><label class="block text-[10px] font-bold uppercase text-slate-400 mb-1">10. State</label><input type="text" id="editState" class="w-full p-2 border rounded text-sm bg-white outline-blue-500"></div>
                    <div><label class="block text-[10px] font-bold uppercase text-slate-400 mb-1">11. Pincode</label><input type="text" id="editPincode" class="w-full p-2 border rounded text-sm bg-white outline-blue-500"></div>

                    <div class="bg-blue-50 p-3 rounded border border-blue-100"><label class="block text-[10px] font-bold uppercase text-blue-600 mb-1">12. User Type</label><select id="editUserType" class="w-full p-2 border border-blue-200 rounded text-sm font-bold bg-white"><option value="member">Member</option><option value="staff">Staff</option><option value="admin">Admin</option></select></div>
                    <div class="bg-blue-50 p-3 rounded border border-blue-100"><label class="block text-[10px] font-bold uppercase text-blue-600 mb-1">13. Expiry Date</label><input type="date" id="editExpiry" class="w-full p-2 border border-blue-200 rounded text-sm font-bold bg-white"></div>
                    <div class="bg-blue-50 p-3 rounded border border-blue-100"><label class="block text-[10px] font-bold uppercase text-blue-600 mb-1">14. Reg Status</label><select id="editStatus" class="w-full p-2 border border-blue-200 rounded text-sm font-bold bg-white"><option value="Pending">Pending</option><option value="Approved">Approved</option></select></div>
                    
                    <div class="bg-blue-50 p-3 rounded border border-blue-100 md:col-start-2"><label class="block text-[10px] font-bold uppercase text-blue-600 mb-1">15. Active Status</label><select id="editIsActive" class="w-full p-2 border border-blue-200 rounded text-sm font-bold bg-white"><option value="true">Active</option><option value="false">Inactive</option></select></div>
                </form>
            </div>

            <div class="p-6 border-t bg-white flex justify-end gap-3 sticky bottom-0 z-20">
                <button onclick="closeModal()" class="px-5 py-2 text-sm font-bold text-slate-500 hover:bg-slate-50 rounded-lg transition">Cancel</button>
                <button id="saveBtn" onclick="saveEdit()" class="px-8 py-2 bg-blue-600 text-white rounded-lg text-sm font-bold shadow-lg hover:bg-blue-700 transition">Save All Changes</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://vxzixltgnuvximbbttxx.supabase.co';
        const SB_KEY = 'sb_publishable_TyLXdjnySjpRxUS-vBk3MQ_mAq1UELd';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        let allApplications = [];

        // ROCK SOLID GATEKEEPER
        async function checkAccess() {
            try {
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (!user) { window.location.replace("login.html"); return; }
                
                const { data: profile, error } = await supabaseClient.from('applications').select('*').eq('email', user.email).single();
                
                // Logic: Approved + Active + Admin type
                if (!profile || error || profile.user_type !== 'admin' || profile.status.toLowerCase() !== 'approved' || profile.is_active !== true) {
                    alert("Unauthorized Access. Requirements: Admin type, Approved status, and Active status.");
                    window.location.replace("dashboard.html");
                } else {
                    document.body.style.display = 'block';
                    document.getElementById('adminControls').classList.remove('hidden');
                    document.getElementById('adminName').innerText = profile.first_name;
                    loadData();
                }
            } catch (err) { window.location.replace("login.html"); }
        }
        checkAccess();

        async function loadData() {
            const { data, error } = await supabaseClient.from('applications').select('*').order('created_at', { ascending: false });
            if (!error) { allApplications = data; renderTable(data); }
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = data.length ? "" : "<tr><td colspan='4' class='p-10 text-center text-slate-400'>No records found</td></tr>";
            data.forEach(app => {
                const picSrc = app.profile_url || 'https://via.placeholder.com/50?text=No+Pic';
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 border-b border-slate-100 transition">
                        <td class="p-4"><div class="flex items-center gap-3">
                            <img src="${picSrc}" class="w-10 h-10 rounded-full bg-slate-200 object-cover" onerror="this.src='https://via.placeholder.com/50'">
                            <div><div class="font-bold text-slate-900">${app.title || ''} ${app.first_name} ${app.last_name}</div><div class="text-[10px] text-slate-400 uppercase font-black">${app.user_type}</div></div>
                        </div></td>
                        <td class="p-4"><div class="text-sm font-semibold text-slate-700">${app.clinic_name || 'N/A'}</div><div class="text-[10px] font-bold text-slate-400">${app.email}</div></td>
                        <td class="p-4">
                            <span class="px-2 py-1 rounded text-[10px] font-bold uppercase ${app.status.toLowerCase() === 'approved' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}">${app.status}</span>
                            <span class="ml-2 text-[10px] font-bold ${app.is_active ? 'text-blue-500' : 'text-slate-400'}">${app.is_active ? 'Active' : 'Inactive'}</span>
                        </td>
                        <td class="p-4 text-center">
                            <button onclick="openEditModal('${app.id}')" class="p-2 text-blue-500 hover:bg-blue-50 rounded"><i class="fa-solid fa-pen-to-square"></i></button>
                        </td>
                    </tr>`;
            });
        }

        function openEditModal(id) {
            const app = allApplications.find(a => a.id === id);
            document.getElementById('editId').value = app.id;
            document.getElementById('modalSubId').innerText = `Record ID: ${app.id}`;
            document.getElementById('modalProfilePicPreview').src = app.profile_url || '';
            document.getElementById('fileUpload').value = "";

            document.getElementById('editTitle').value = app.title || '';
            document.getElementById('editFirstName').value = app.first_name || '';
            document.getElementById('editLastName').value = app.last_name || '';
            document.getElementById('editEmail').value = app.email || '';
            document.getElementById('editMobile').value = app.mobile_number || '';
            document.getElementById('editDob').value = app.dob || '';
            document.getElementById('editClinic').value = app.clinic_name || '';
            document.getElementById('editAddress').value = app.address || '';
            document.getElementById('editCity').value = app.city || '';
            document.getElementById('editState').value = app.state || '';
            document.getElementById('editPincode').value = app.pincode || '';
            document.getElementById('editUserType').value = app.user_type || 'member';
            document.getElementById('editExpiry').value = app.expiry_date || '';
            document.getElementById('editStatus').value = app.status || 'Pending';
            document.getElementById('editIsActive').value = app.is_active === true ? "true" : "false";

            document.getElementById('editModal').style.display = 'block';
        }

        function closeModal() { document.getElementById('editModal').style.display = 'none'; }

        async function saveEdit() {
            const btn = document.getElementById('saveBtn');
            const id = document.getElementById('editId').value;
            const file = document.getElementById('fileUpload').files[0];
            btn.disabled = true;
            btn.innerText = "Saving...";

            let updateData = {
                title: document.getElementById('editTitle').value,
                first_name: document.getElementById('editFirstName').value,
                last_name: document.getElementById('editLastName').value,
                mobile_number: document.getElementById('editMobile').value,
                dob: document.getElementById('editDob').value || null,
                clinic_name: document.getElementById('editClinic').value,
                address: document.getElementById('editAddress').value,
                city: document.getElementById('editCity').value,
                state: document.getElementById('editState').value,
                pincode: document.getElementById('editPincode').value,
                user_type: document.getElementById('editUserType').value,
                expiry_date: document.getElementById('editExpiry').value || null,
                status: document.getElementById('editStatus').value,
                is_active: document.getElementById('editIsActive').value === "true"
            };

            if (file) {
                const fileName = `${id}_${Date.now()}`;
                const { error: uploadErr } = await supabaseClient.storage.from('profiles').upload(fileName, file);
                if (!uploadErr) {
                    const { data: publicUrlData } = supabaseClient.storage.from('profiles').getPublicUrl(fileName);
                    updateData.profile_url = publicUrlData.publicUrl;
                    updateData.profile_picture = publicUrlData.publicUrl;
                }
            }

            const { error } = await supabaseClient.from('applications').update(updateData).eq('id', id);
            if (!error) { closeModal(); loadData(); } else { alert("Update Error: " + error.message); }
            btn.disabled = false;
            btn.innerText = "Save All Changes";
        }

        function filterTable() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const typeFilter = document.getElementById('filterType').value;
            const filtered = allApplications.filter(app => {
                const searchMatch = `${app.first_name} ${app.last_name} ${app.email}`.toLowerCase().includes(query);
                const typeMatch = (typeFilter === 'all' || app.user_type === typeFilter);
                return searchMatch && typeMatch;
            });
            renderTable(filtered);
        }

        async function handleLogout() { await supabaseClient.auth.signOut(); window.location.replace("login.html"); }
    </script>
</body>
</html>
