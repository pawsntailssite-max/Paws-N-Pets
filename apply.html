<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | PAWS-N-TAILS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Smooth fade-in animation for the success message */
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen py-10 px-4">

    <div class="text-center mb-8">
        <a href="index.html" class="inline-block">
            <img src="Logo.jpg" alt="PAWS-N-TAILS Logo" onerror="this.style.display='none'; document.getElementById('fallback-icon').style.display='block';" class="h-24 w-auto mx-auto mb-2 drop-shadow-md rounded-lg">
            <div id="fallback-icon" style="display:none;" class="text-blue-600 mb-2"><i class="fa-solid fa-paw text-5xl"></i></div>
        </a>
        <h2 class="text-2xl font-bold text-slate-800">Veterinarian Registration</h2>
        <p class="text-slate-500 text-sm mt-1">Join the PAWS-N-TAILS professional network.</p>
    </div>

    <div class="max-w-3xl mx-auto bg-white p-8 rounded-2xl shadow-lg border border-slate-100">
        
        <form id="applyForm" class="space-y-6">
            
            <div>
                <h3 class="text-lg font-semibold border-b pb-2 mb-4 text-slate-700"><i class="fa-solid fa-user-doctor mr-2 text-blue-500"></i>Personal Details</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    
                    <div class="col-span-1">
                        <label class="block text-sm font-medium text-slate-600 mb-1">Title *</label>
                        <select id="title" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none bg-white">
                            <option value="" disabled selected>Select...</option>
                            <option value="Dr.">Dr.</option>
                            <option value="Mr.">Mr.</option>
                            <option value="Ms.">Ms.</option>
                            <option value="Mrs.">Mrs.</option>
                        </select>
                    </div>

                    <div class="col-span-1 md:col-span-1">
                        <label class="block text-sm font-medium text-slate-600 mb-1">First Name *</label>
                        <input type="text" id="firstName" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                    </div>

                    <div class="col-span-1 md:col-span-1">
                        <label class="block text-sm font-medium text-slate-600 mb-1">Last Name *</label>
                        <input type="text" id="lastName" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">Date of Birth *</label>
                        <input type="date" id="dob" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-slate-700">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">Mobile Number *</label>
                        <input type="tel" id="mobile" required placeholder="+91 9876543210" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                    </div>
                </div>

                <div class="mt-4">
                    <label class="block text-sm font-medium text-slate-600 mb-1">Email Address *</label>
                    <input type="email" id="email" required placeholder="doctor@clinic.com" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                </div>
            </div>

            <div class="pt-4">
                <h3 class="text-lg font-semibold border-b pb-2 mb-4 text-slate-700"><i class="fa-solid fa-house-medical mr-2 text-blue-500"></i>Clinic / Company Details</h3>
                
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">Name of Clinic/Company *</label>
                    <input type="text" id="clinicName" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                </div>

                <div class="mt-4">
                    <label class="block text-sm font-medium text-slate-600 mb-1">Full Address *</label>
                    <textarea id="address" rows="2" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"></textarea>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">City *</label>
                        <input type="text" id="city" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">State *</label>
                        <input type="text" id="state" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">Pincode *</label>
                        <input type="text" id="pincode" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                    </div>
                </div>
            </div>

            <div class="pt-6">
                <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-md transition-all hover:-translate-y-1 text-lg flex justify-center items-center gap-2">
                    Submit Application <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>
            
            <div id="messageBox" style="display:none;" class="p-4 rounded-lg mt-4 text-center font-medium fade-in"></div>

        </form>
    </div>

    <script>
        const SB_URL = 'https://vxzixltgnuvximbbttxx.supabase.co';
        const SB_KEY = 'sb_publishable_TyLXdjnySjpRxUS-vBk3MQ_mAq1UELd';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        const form = document.getElementById('applyForm');
        const submitBtn = document.getElementById('submitBtn');
        const msgBox = document.getElementById('messageBox');
        
        form.onsubmit = async (e) => {
            e.preventDefault();
            
            // Visual feedback while submitting
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Submitting...';
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-70');
            msgBox.style.display = "none";
            
            // Gather all data
            const newApplication = {
                title: document.getElementById('title').value,
                first_name: document.getElementById('firstName').value,
                last_name: document.getElementById('lastName').value,
                dob: document.getElementById('dob').value,
                mobile_number: document.getElementById('mobile').value,
                email: document.getElementById('email').value,
                clinic_name: document.getElementById('clinicName').value,
                address: document.getElementById('address').value,
                city: document.getElementById('city').value,
                state: document.getElementById('state').value,
                pincode: document.getElementById('pincode').value
                // Note: user_type, expiry_date, is_active, and status are handled automatically by database defaults
            };

            // Send to Supabase
            const { error } = await supabaseClient
                .from('applications')
                .insert([newApplication]);

            // Handle Response
            msgBox.style.display = "block";
            if (error) {
                console.error(error);
                msgBox.className = "p-4 rounded-lg mt-4 text-center font-medium fade-in bg-red-100 text-red-700 border border-red-200";
                msgBox.innerHTML = '<i class="fa-solid fa-circle-exclamation mr-2"></i> Error: ' + error.message;
            } else {
                msgBox.className = "p-4 rounded-lg mt-4 text-center font-medium fade-in bg-green-100 text-green-700 border border-green-200";
                msgBox.innerHTML = '<i class="fa-solid fa-circle-check mr-2"></i> <strong>Success!</strong> Your application has been submitted for review.';
                form.reset();
            }

            // Reset button state
            submitBtn.innerHTML = 'Submit Application <i class="fa-solid fa-arrow-right"></i>';
            submitBtn.disabled = false;
            submitBtn.classList.remove('opacity-70');
        };
    </script>
</body>
</html>
