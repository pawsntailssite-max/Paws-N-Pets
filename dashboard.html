<div>
    <label class="text-[10px] font-bold text-slate-400 uppercase">4. Email (Identity)</label>
    <input type="email" id="email" class="w-full p-3 bg-white border-2 border-blue-100 rounded-xl font-semibold focus:border-blue-500 outline-none">
    <p class="text-[9px] text-orange-500 mt-1 font-bold italic">* Changing this affects your login identity.</p>
</div>

<script>
    // ... client initialization ...

    let originalEmail = ""; // We need this to find the row if the email changes

    async function initDashboard() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) { window.location.replace("index.html"); return; }

        const { data: profile, error } = await supabaseClient
            .from('applications')
            .select('*')
            .eq('email', user.email)
            .single();

        if (error || !profile) { window.location.replace("index.html"); return; }

        originalEmail = profile.email; // Store the current email

        // Populate fields
        document.getElementById('email').value = profile.email || '';
        // ... populate other fields ...
        document.body.style.display = 'block';
    }

    document.getElementById('profileForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('saveBtn');
        const newEmail = document.getElementById('email').value;
        
        btn.disabled = true;
        btn.innerText = "UPDATING IDENTITY...";

        let updateData = {
            email: newEmail, // Now including the email in the update
            title: document.getElementById('title').value,
            first_name: document.getElementById('firstName').value,
            last_name: document.getElementById('lastName').value,
            mobile_number: document.getElementById('mobile').value,
            // ... other fields ...
        };

        // TARGETING BY ORIGINAL EMAIL
        const { data, error } = await supabaseClient
            .from('applications')
            .update(updateData)
            .eq('email', originalEmail) 
            .select();

        if (error) {
            console.error("Update Error:", error);
            alert("Error: " + error.message);
            btn.disabled = false;
        } else if (data && data.length > 0) {
            alert("Email and Profile updated! Please note: Your login email has NOT changed in the Auth system yet.");
            window.location.href = "navigation.html";
        } else {
            alert("Permission Denied: RLS is blocking the email change.");
            btn.disabled = false;
        }
    };
</script>
