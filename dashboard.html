<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | PAWS-N-TAILS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { display: none; }
        .dropdown-content { display: none; }
        .dropdown-content.show { display: block; }
        /* Style for password toggle icons */
        .pass-toggle { cursor: pointer; color: #94a3b8; transition: color 0.2s; }
        .pass-toggle:hover { color: #3b82f6; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <nav class="bg-white border-b border-slate-200 px-4 py-2 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="./Logo.jpg" alt="Logo" class="w-10 h-10 object-contain" onerror="this.src='https://via.placeholder.com/40?text=LOGO'">
                <span class="text-lg font-black tracking-tighter text-slate-900 uppercase">Paws & Tails</span>
            </div>
            <div class="flex items-center gap-4">
                <div class="relative">
                    <button onclick="toggleDropdown()" class="flex items-center gap-2 px-4 py-2 rounded-lg hover:bg-slate-100 font-bold text-sm text-slate-600">
                        <i class="fa-solid fa-gauge-high"></i> Dashboard <i class="fa-solid fa-chevron-down text-[10px]"></i>
                    </button>
                    <div id="dashboardDropdown" class="dropdown-content absolute right-0 mt-2 w-48 bg-white border border-slate-200 rounded-xl shadow-xl py-2 z-50">
                        <a href="dashboard.html" class="block px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-blue-50">User Profile</a>
                    </div>
                </div>
                <a id="adminNavLink" href="admin.html" class="hidden flex items-center gap-2 px-4 py-2 rounded-lg text-purple-600 font-bold text-sm">Admin Panel</a>
                <button onclick="handleLogout()" class="px-4 py-2 text-red-500 font-bold text-sm">Logout</button>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-6 md:p-12 space-y-8">
        <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
            <div class="bg-blue-600 p-8 text-white flex flex-col md:flex-row items-center gap-8">
                <div class="relative group">
                    <img id="profilePicPreview" src="" class="w-28 h-28 rounded-full border-4 border-white/30 object-cover shadow-2xl" onerror="this.src='https://via.placeholder.com/150'">
                    <label for="fileUpload" class="absolute inset-0 flex items-center justify-center bg-black/40 rounded-full opacity-0 group-hover:opacity-100 cursor-pointer">
                        <i class="fa-solid fa-camera text-2xl"></i>
                    </label>
                    <input type="file" id="fileUpload" class="hidden" accept="image/*" onchange="previewImage(this)">
                </div>
                <div class="text-center md:text-left">
                    <h2 class="text-3xl font-bold" id="userNameHeader">User Profile</h2>
                    <p class="text-blue-100 opacity-80" id="userEmailHeader"></p>
                </div>
            </div>

            <form id="profileForm" class="p-8 grid grid-cols-1 md:grid-cols-3 gap-6">
                <input type="hidden" id="internalId">
                <div><label class="text-[10px] font-bold text-slate-400 uppercase">1. Title</label><input type="text" id="title" class="w-full p-3 bg-slate-50 border rounded-xl font-semibold"></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase">2. First Name</label><input type="text" id="firstName" class="w-full p-3 bg-slate-50 border rounded-xl font-semibold"></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase">3. Last Name</label><input type="text" id="lastName" class="w-full p-3 bg-slate-50 border rounded-xl font-semibold"></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase">4. Profile Email</label><input type="email" id="email" class="w-full p-3 bg-white border-2 border-blue-50 rounded-xl font-semibold focus:border-blue-500 outline-none"></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase">5. Mobile Number</label><input type="text" id="mobile" class="w-full p-3 bg-slate-50 border rounded-xl font-semibold"></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase">6. Date of Birth</label><input type="date" id="dob" class="w-full p-3 bg-slate-50 border rounded-xl font-semibold"></div>
                <div class="md:col-span-3"><label class="text-[10px] font-bold text-slate-400 uppercase">7. Business Name</label><input type="text" id="clinic" class="w-full p-3 bg-slate-50 border rounded-xl font-semibold"></div>
                <div class="md:col-span-3"><label class="text-[10px] font-bold text-slate-400 uppercase">8. Address</label><input type="text" id="address" class="w-full p-3 bg-slate-50 border rounded-xl font-semibold"></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase">9. City</label><input type="text" id="city" class="w-full p-3 bg-slate-50 border rounded-xl font-semibold"></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase">10. State</label><input type="text" id="state" class="w-full p-3 bg-slate-50 border rounded-xl font-semibold"></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase">11. Pincode</label><input type="text" id="pincode" class="w-full p-3 bg-slate-50 border rounded-xl font-semibold"></div>
                <div class="md:col-span-3 pt-8 flex gap-4">
                    <button type="button" onclick="window.location.href='navigation.html'" class="flex-1 py-4 border-2 border-slate-200 text-slate-600 font-black rounded-2xl uppercase">Discard</button>
                    <button type="submit" id="saveBtn" class="flex-1 py-4 bg-blue-600 text-white font-black rounded-2xl shadow-xl uppercase">Save Changes</button>
                </div>
            </form>
        </div>

        <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
            <div class="bg-slate-800 p-6 text-white flex items-center gap-4">
                <div class="bg-slate-700 p-3 rounded-xl"><i class="fa-solid fa-lock text-xl"></i></div>
                <div>
                    <h2 class="text-xl font-bold uppercase tracking-wide">Security Settings</h2>
                    <p class="text-slate-400 text-xs">Update your account password</p>
                </div>
            </div>

            <form id="securityForm" class="p-8 grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="relative">
                    <label class="text-[10px] font-bold text-slate-400 uppercase">New Password</label>
                    <div class="relative">
                        <input type="password" id="newPassword" placeholder="Minimum 6 characters" required class="w-full p-3 bg-slate-50 border rounded-xl font-semibold outline-none focus:border-blue-500 pr-10">
                        <span class="absolute right-3 top-3.5 pass-toggle" onclick="togglePass('newPassword', this)">
                            <i class="fa-solid fa-eye"></i>
                        </span>
                    </div>
                </div>

                <div class="relative">
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Confirm Password</label>
                    <div class="relative">
                        <input type="password" id="confirmPassword" placeholder="Repeat new password" required class="w-full p-3 bg-slate-50 border rounded-xl font-semibold outline-none focus:border-blue-500 pr-10">
                        <span class="absolute right-3 top-3.5 pass-toggle" onclick="togglePass('confirmPassword', this)">
                            <i class="fa-solid fa-eye"></i>
                        </span>
                    </div>
                </div>

                <div class="md:col-span-2 pt-4 flex gap-4">
                    <button type="button" onclick="window.location.href='navigation.html'" class="flex-1 py-4 border-2 border-slate-200 text-slate-600 font-black rounded-2xl uppercase">Discard</button>
                    <button type="submit" id="savePassBtn" class="flex-1 py-4 bg-slate-800 text-white font-black rounded-2xl shadow-xl uppercase">Update Password</button>
                </div>
            </form>
        </div>
    </main>

    <script>
        const SB_URL = 'https://vxzixltgnuvximbbttxx.supabase.co';
        const SB_KEY = 'sb_publishable_TyLXdjnySjpRxUS-vBk3MQ_mAq1UELd';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        async function initDashboard() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) { window.location.replace("index.html"); return; }

            let { data: profile, error } = await supabaseClient
                .from('applications')
                .select('*')
                .eq('id', user.id)
                .single();

            if (!profile || error) {
                const fallback = await supabaseClient.from('applications').select('*').eq('email', user.email).single();
                profile = fallback.data;
                error = fallback.error;
            }

            if (error || !profile) {
                alert("Profile not found. Please check your database records.");
                document.body.style.display = 'block';
                return;
            }

            // Fill Form
            document.getElementById('internalId').value = profile.id;
            document.getElementById('userNameHeader').innerText = `${profile.first_name || ''} ${profile.last_name || ''}` || 'User Profile';
            document.getElementById('userEmailHeader').innerText = profile.email;
            document.getElementById('profilePicPreview').src = profile.profile_url || profile.profile_picture || 'https://via.placeholder.com/150';
            
            document.getElementById('title').value = profile.title || '';
            document.getElementById('firstName').value = profile.first_name || '';
            document.getElementById('lastName').value = profile.last_name || '';
            document.getElementById('email').value = profile.email || '';
            document.getElementById('mobile').value = profile.mobile_number || '';
            document.getElementById('dob').value = profile.dob || '';
            document.getElementById('clinic').value = profile.clinic_name || '';
            document.getElementById('address').value = profile.address || '';
            document.getElementById('city').value = profile.city || '';
            document.getElementById('state').value = profile.state || '';
            document.getElementById('pincode').value = profile.pincode || '';

            if (profile.user_type === 'admin') document.getElementById('adminNavLink').classList.remove('hidden');
            document.body.style.display = 'block';
        }

        // --- PROFILE FORM LOGIC ---
        document.getElementById('profileForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            const rowId = document.getElementById('internalId').value;
            const file = document.getElementById('fileUpload').files[0];
            
            btn.disabled = true;
            btn.innerText = "SAVING...";

            let updateData = {
                email: document.getElementById('email').value,
                title: document.getElementById('title').value,
                first_name: document.getElementById('firstName').value,
                last_name: document.getElementById('lastName').value,
                mobile_number: document.getElementById('mobile').value,
                dob: document.getElementById('dob').value || null,
                clinic_name: document.getElementById('clinic').value,
                address: document.getElementById('address').value,
                city: document.getElementById('city').value,
                state: document.getElementById('state').value,
                pincode: document.getElementById('pincode').value
            };

            const { data: { user } } = await supabaseClient.auth.getUser();

            if (file) {
                const fileName = `${user.id}_${Date.now()}`;
                const { error: upErr } = await supabaseClient.storage.from('profiles').upload(fileName, file);
                if (!upErr) {
                    const { data: pub } = supabaseClient.storage.from('profiles').getPublicUrl(fileName);
                    updateData.profile_url = pub.publicUrl;
                    updateData.profile_picture = pub.publicUrl;
                }
            }

            const { error } = await supabaseClient
                .from('applications')
                .update(updateData)
                .or(`id.eq.${rowId},email.eq.${user.email}`);

            if (error) {
                alert("Update Error: " + error.message);
                btn.disabled = false;
                btn.innerText = "Save Changes";
            } else {
                alert("Profile Updated!");
                window.location.href = "navigation.html";
            }
        };

        // --- SECURITY FORM LOGIC ---
        document.getElementById('securityForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('savePassBtn');
            const pass = document.getElementById('newPassword').value;
            const conf = document.getElementById('confirmPassword').value;

            if (pass !== conf) {
                alert("Passwords do not match!");
                return;
            }
            if (pass.length < 6) {
                alert("Password must be at least 6 characters long.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "UPDATING...";

            const { error } = await supabaseClient.auth.updateUser({ password: pass });

            if (error) {
                alert("Security Error: " + error.message);
                btn.disabled = false;
                btn.innerText = "Update Password";
            } else {
                alert("Password updated successfully!");
                window.location.href = "navigation.html";
            }
        };

        // Toggle Password Visibility
        function togglePass(inputId, iconEl) {
            const input = document.getElementById(inputId);
            const icon = iconEl.querySelector('i');
            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = "password";
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => document.getElementById('profilePicPreview').src = e.target.result;
                reader.readAsDataURL(input.files[0]);
            }
        }
        function toggleDropdown() { document.getElementById('dashboardDropdown').classList.toggle('show'); }
        async function handleLogout() { await supabaseClient.auth.signOut(); window.location.replace("index.html"); }

        initDashboard();
    </script>
</body>
</html>
