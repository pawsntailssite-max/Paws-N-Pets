<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile | PAWS-N-TAILS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { display: none; } /* Hidden until auth check */
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <nav class="bg-white border-b border-slate-200 px-4 py-2 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="./Logo.jpg" class="w-10 h-10 object-contain" onerror="this.src='https://via.placeholder.com/40'">
                <span class="text-lg font-black text-slate-900 uppercase">User Profile</span>
            </div>
            <button onclick="window.location.href='navigation.html'" class="text-xs font-bold text-blue-600 hover:text-blue-800 uppercase tracking-widest">
                <i class="fa-solid fa-arrow-left"></i> Back to Hub
            </button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-6 md:p-12">
        <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
            
            <div class="p-8 border-b border-slate-50 bg-slate-50/30 flex flex-col items-center">
                <div class="relative group">
                    <img id="profilePreview" src="https://via.placeholder.com/150" class="w-32 h-32 rounded-full border-4 border-white shadow-lg object-cover">
                    <label for="fileUpload" class="absolute bottom-0 right-0 bg-blue-600 text-white p-2.5 rounded-full cursor-pointer shadow-lg hover:bg-blue-700 transition-all">
                        <i class="fa-solid fa-camera"></i>
                    </label>
                    <input type="file" id="fileUpload" class="hidden" accept="image/*" onchange="previewImage(this)">
                </div>
                <h2 id="displayUserName" class="text-xl font-bold mt-4 text-slate-900">Member Profile</h2>
                <p id="displayEmail" class="text-sm text-slate-400 font-medium"></p>
            </div>

            <div class="p-8">
                <form id="profileForm" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase">1. Title</label>
                        <input type="text" id="editTitle" class="w-full p-2.5 border border-slate-200 rounded-xl mt-1 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase">2. First Name</label>
                        <input type="text" id="editFirstName" class="w-full p-2.5 border border-slate-200 rounded-xl mt-1 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase">3. Last Name</label>
                        <input type="text" id="editLastName" class="w-full p-2.5 border border-slate-200 rounded-xl mt-1 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase">4. Email</label>
                        <input type="email" id="editEmail" disabled class="w-full p-2.5 border border-slate-200 rounded-xl mt-1 text-sm bg-slate-100 text-slate-500">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase">5. Mobile</label>
                        <input type="text" id="editMobile" class="w-full p-2.5 border border-slate-200 rounded-xl mt-1 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase">6. DOB</label>
                        <input type="date" id="editDob" class="w-full p-2.5 border border-slate-200 rounded-xl mt-1 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div class="md:col-span-3">
                        <label class="text-[10px] font-bold text-slate-400 uppercase">7. Business Name</label>
                        <input type="text" id="editClinic" class="w-full p-2.5 border border-slate-200 rounded-xl mt-1 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div class="md:col-span-3">
                        <label class="text-[10px] font-bold text-slate-400 uppercase">8. Address</label>
                        <input type="text" id="editAddress" class="w-full p-2.5 border border-slate-200 rounded-xl mt-1 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase">9. City</label>
                        <input type="text" id="editCity" class="w-full p-2.5 border border-slate-200 rounded-xl mt-1 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase">10. State</label>
                        <input type="text" id="editState" class="w-full p-2.5 border border-slate-200 rounded-xl mt-1 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase">11. Pincode</label>
                        <input type="text" id="editPincode" class="w-full p-2.5 border border-slate-200 rounded-xl mt-1 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </form>

                <div class="mt-12 flex flex-col md:flex-row gap-4">
                    <button onclick="window.location.href='navigation.html'" class="flex-1 py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold hover:bg-slate-200 transition-all">
                        Discard Changes
                    </button>
                    <button id="saveBtn" onclick="saveProfile()" class="flex-[2] py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all flex items-center justify-center gap-2">
                        <i class="fa-solid fa-check"></i> Save Profile
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = 'https://vxzixltgnuvximbbttxx.supabase.co';
        const SB_KEY = 'sb_publishable_TyLXdjnySjpRxUS-vBk3MQ_mAq1UELd';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        let currentUserEmail = "";
        let currentUserId = "";

        async function initDashboard() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) { window.location.replace("index.html"); return; }
            
            currentUserEmail = user.email;
            currentUserId = user.id;

            const { data: profile, error } = await supabaseClient
                .from('applications')
                .select('*')
                .eq('email', user.email)
                .single();

            if (profile) {
                // Populate Fields 1-11
                document.getElementById('editTitle').value = profile.title || '';
                document.getElementById('editFirstName').value = profile.first_name || '';
                document.getElementById('editLastName').value = profile.last_name || '';
                document.getElementById('editEmail').value = profile.email || '';
                document.getElementById('editMobile').value = profile.mobile_number || '';
                document.getElementById('editDob').value = profile.dob || '';
                document.getElementById('editClinic').value = profile.clinic_name || '';
                document.getElementById('editAddress').value = profile.address || '';
                document.getElementById('editCity').value = profile.city || '';
                document.getElementById('editState').value = profile.state || '';
                document.getElementById('editPincode').value = profile.pincode || '';

                // Header Info
                document.getElementById('displayUserName').innerText = `${profile.first_name} ${profile.last_name}`;
                document.getElementById('displayEmail').innerText = profile.email;
                document.getElementById('profilePreview').src = profile.profile_url || 'https://via.placeholder.com/150';
                
                document.body.style.display = 'block';
            } else {
                alert("Profile not found.");
                window.location.replace("index.html");
            }
        }

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) { document.getElementById('profilePreview').src = e.target.result; }
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function saveProfile() {
            const btn = document.getElementById('saveBtn');
            const file = document.getElementById('fileUpload').files[0];
            btn.disabled = true;
            btn.innerText = "Updating...";

            let updateData = {
                title: document.getElementById('editTitle').value,
                first_name: document.getElementById('editFirstName').value,
                last_name: document.getElementById('editLastName').value,
                mobile_number: document.getElementById('editMobile').value,
                dob: document.getElementById('editDob').value || null,
                clinic_name: document.getElementById('editClinic').value,
                address: document.getElementById('editAddress').value,
                city: document.getElementById('editCity').value,
                state: document.getElementById('editState').value,
                pincode: document.getElementById('editPincode').value
            };

            // Handle Photo Upload exactly like admin.html
            if (file) {
                const fileName = `${currentUserId}_${Date.now()}`;
                const { error: upErr } = await supabaseClient.storage.from('profiles').upload(fileName, file);
                if (!upErr) {
                    const { data: pub } = supabaseClient.storage.from('profiles').getPublicUrl(fileName);
                    updateData.profile_url = pub.publicUrl;
                    updateData.profile_picture = pub.publicUrl; // Internal field sync
                } else {
                    console.error("Upload error:", upErr);
                }
            }

            const { error } = await supabaseClient
                .from('applications')
                .update(updateData)
                .eq('email', currentUserEmail);

            if (!error) {
                alert("Profile updated successfully!");
                location.reload();
            } else {
                alert("Error: " + error.message);
            }
            btn.disabled = false;
            btn.innerText = "Save Profile";
        }

        initDashboard();
    </script>
</body>
</html>
