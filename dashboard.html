<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | PAWS-N-TAILS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { display: none; }
        .dropdown-content { display: none; }
        .dropdown-content.show { display: block; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <nav class="bg-white border-b border-slate-200 px-4 py-2 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="./Logo.jpg" alt="Logo" class="w-10 h-10 object-contain" onerror="this.src='https://via.placeholder.com/40?text=LOGO'">
                <span class="text-lg font-black tracking-tighter text-slate-900 hidden sm:block">PAWS-N-TAILS</span>
            </div>

            <div class="flex items-center gap-1">
                <div class="relative">
                    <button onclick="toggleDropdown()" class="flex items-center gap-2 px-4 py-2 rounded-lg hover:bg-slate-100 font-bold text-sm text-slate-600">
                        <i class="fa-solid fa-gauge-high"></i> Dashboard <i class="fa-solid fa-chevron-down text-[10px]"></i>
                    </button>
                    <div id="dashboardDropdown" class="dropdown-content absolute left-0 mt-2 w-48 bg-white border border-slate-200 rounded-xl shadow-xl py-2 z-50">
                        <a href="dashboard.html" class="block px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-blue-50">User Profile</a>
                    </div>
                </div>
                <a id="adminNavLink" href="admin.html" class="hidden flex items-center gap-2 px-4 py-2 rounded-lg text-purple-600 font-bold text-sm">Admin Panel</a>
                <button onclick="handleLogout()" class="px-4 py-2 text-red-500 font-bold text-sm">Logout</button>
            </div>

            <div class="flex items-center gap-3 border-l pl-4 border-slate-100">
                <div class="text-right hidden md:block">
                    <p id="navBusinessName" class="text-xs font-black text-slate-900 uppercase"></p>
                    <p class="text-[9px] font-bold text-blue-500 uppercase tracking-widest">Active Member</p>
                </div>
                <img id="navProfilePic" src="" class="w-9 h-9 rounded-full border-2 border-white shadow-sm object-cover" onerror="this.src='https://via.placeholder.com/150'">
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-6 md:p-12">
        <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
            
            <div class="bg-blue-600 p-8 text-white flex flex-col md:flex-row items-center gap-8">
                <div class="relative group">
                    <img id="profilePicPreview" src="" class="w-28 h-28 rounded-full border-4 border-white/30 object-cover shadow-2xl" onerror="this.src='https://via.placeholder.com/150'">
                    <label for="fileUpload" class="absolute inset-0 flex items-center justify-center bg-black/40 rounded-full opacity-0 group-hover:opacity-100 cursor-pointer">
                        <i class="fa-solid fa-camera text-2xl"></i>
                    </label>
                    <input type="file" id="fileUpload" class="hidden" accept="image/*" onchange="previewImage(this)">
                </div>
                <div class="text-center md:text-left">
                    <h2 class="text-3xl font-bold" id="userNameHeader">My Profile</h2>
                    <p class="text-blue-100 opacity-80" id="userEmailHeader"></p>
                </div>
            </div>

            <form id="profileForm" class="p-8 grid grid-cols-1 md:grid-cols-3 gap-6">
                <input type="hidden" id="internalId">

                <div><label class="text-[10px] font-bold text-slate-400 uppercase">Title</label>
                <input type="text" id="title" class="w-full p-3 bg-slate-50 border rounded-xl font-semibold"></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase">First Name</label>
                <input type="text" id="firstName" class="w-full p-3 bg-slate-50 border rounded-xl font-semibold"></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase">Last Name</label>
                <input type="text" id="lastName" class="w-full p-3 bg-slate-50 border rounded-xl font-semibold"></div>

                <div><label class="text-[10px] font-bold text-slate-400 uppercase">Email (Locked)</label>
                <input type="email" id="email" disabled class="w-full p-3 bg-slate-100 border rounded-xl font-semibold text-slate-400"></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase">Mobile</label>
                <input type="text" id="mobile" class="w-full p-3 bg-slate-50 border rounded-xl font-semibold"></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase">DOB</label>
                <input type="date" id="dob" class="w-full p-3 bg-slate-50 border rounded-xl font-semibold"></div>

                <div class="md:col-span-3"><label class="text-[10px] font-bold text-slate-400 uppercase">Business Name</label>
                <input type="text" id="clinic" class="w-full p-3 bg-slate-50 border rounded-xl font-semibold"></div>
                <div class="md:col-span-3"><label class="text-[10px] font-bold text-slate-400 uppercase">Address</label>
                <input type="text" id="address" class="w-full p-3 bg-slate-50 border rounded-xl font-semibold"></div>

                <div><label class="text-[10px] font-bold text-slate-400 uppercase">City</label>
                <input type="text" id="city" class="w-full p-3 bg-slate-50 border rounded-xl font-semibold"></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase">State</label>
                <input type="text" id="state" class="w-full p-3 bg-slate-50 border rounded-xl font-semibold"></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase">Pincode</label>
                <input type="text" id="pincode" class="w-full p-3 bg-slate-50 border rounded-xl font-semibold"></div>

                <div class="md:col-span-3 pt-8 flex gap-4">
                    <button type="button" onclick="window.location.href='navigation.html'" class="flex-1 py-4 border-2 border-slate-200 text-slate-600 font-black rounded-2xl uppercase">Discard</button>
                    <button type="submit" id="saveBtn" class="flex-1 py-4 bg-blue-600 text-white font-black rounded-2xl shadow-xl uppercase">Save Changes</button>
                </div>
            </form>
        </div>
    </main>

    <script>
        const SB_URL = 'https://vxzixltgnuvximbbttxx.supabase.co';
        const SB_KEY = 'sb_publishable_TyLXdjnySjpRxUS-vBk3MQ_mAq1UELd';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        async function initDashboard() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) { window.location.replace("index.html"); return; }

            const { data: profile, error } = await supabaseClient
                .from('applications')
                .select('*')
                .eq('email', user.email)
                .single();

            if (error || !profile) { 
                console.error("Init Error:", error);
                window.location.replace("index.html"); 
                return; 
            }

            // Capture the ID immediately so we have it for the update
            document.getElementById('internalId').value = profile.id;
            
            document.getElementById('navBusinessName').innerText = profile.clinic_name || 'Individual';
            document.getElementById('navProfilePic').src = profile.profile_url || profile.profile_picture || 'https://via.placeholder.com/150';
            document.getElementById('userNameHeader').innerText = `${profile.first_name} ${profile.last_name}`;
            document.getElementById('userEmailHeader').innerText = profile.email;
            document.getElementById('profilePicPreview').src = profile.profile_url || profile.profile_picture || 'https://via.placeholder.com/150';

            document.getElementById('title').value = profile.title || '';
            document.getElementById('firstName').value = profile.first_name || '';
            document.getElementById('lastName').value = profile.last_name || '';
            document.getElementById('email').value = profile.email || '';
            document.getElementById('mobile').value = profile.mobile_number || '';
            document.getElementById('dob').value = profile.dob || '';
            document.getElementById('clinic').value = profile.clinic_name || '';
            document.getElementById('address').value = profile.address || '';
            document.getElementById('city').value = profile.city || '';
            document.getElementById('state').value = profile.state || '';
            document.getElementById('pincode').value = profile.pincode || '';

            if (profile.user_type === 'admin') document.getElementById('adminNavLink').classList.remove('hidden');
            document.body.style.display = 'block';
        }

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => document.getElementById('profilePicPreview').src = e.target.result;
                reader.readAsDataURL(input.files[0]);
            }
        }

        document.getElementById('profileForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            const rowId = document.getElementById('internalId').value;
            const file = document.getElementById('fileUpload').files[0];
            
            if (!rowId) { alert("Error: User ID not found. Refresh the page."); return; }

            btn.disabled = true;
            btn.innerText = "SAVING...";

            let updateData = {
                title: document.getElementById('title').value,
                first_name: document.getElementById('firstName').value,
                last_name: document.getElementById('lastName').value,
                mobile_number: document.getElementById('mobile').value,
                dob: document.getElementById('dob').value || null,
                clinic_name: document.getElementById('clinic').value,
                address: document.getElementById('address').value,
                city: document.getElementById('city').value,
                state: document.getElementById('state').value,
                pincode: document.getElementById('pincode').value
            };

            if (file) {
                const fileName = `profile_${rowId}_${Date.now()}`;
                const { error: upErr } = await supabaseClient.storage.from('profiles').upload(fileName, file);
                if (!upErr) {
                    const { data: pub } = supabaseClient.storage.from('profiles').getPublicUrl(fileName);
                    updateData.profile_url = pub.publicUrl;
                    updateData.profile_picture = pub.publicUrl;
                }
            }

            console.log("Pushing update to ID:", rowId);

            const { data, error } = await supabaseClient
                .from('applications')
                .update(updateData)
                .eq('id', rowId)
                .select();

            if (error) {
                console.error("Supabase Error:", error);
                alert("Database Error: " + error.message);
                btn.disabled = false;
                btn.innerText = "Save Changes";
            } else if (data && data.length > 0) {
                alert("Profile successfully saved!");
                window.location.href = "navigation.html";
            } else {
                // This is the "No rows updated" case
                alert("Permission Denied: You don't have permission to update this row. Check your Supabase RLS Policies.");
                btn.disabled = false;
                btn.innerText = "Save Changes";
            }
        };

        function toggleDropdown() { document.getElementById('dashboardDropdown').classList.toggle('show'); }
        async function handleLogout() { await supabaseClient.auth.signOut(); window.location.replace("index.html"); }
        initDashboard();
    </script>
</body>
</html>
