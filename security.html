<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security | PAWS-N-TAILS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <nav class="bg-white border-b border-slate-200 px-4 py-2 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="./Logo.jpg" class="w-10 h-10 object-contain">
                <span class="text-lg font-black text-slate-900 uppercase">Security Settings</span>
            </div>
            <button onclick="window.location.href='navigation.html'" class="text-sm font-bold text-slate-400 hover:text-slate-600">
                <i class="fa-solid fa-xmark"></i> Close
            </button>
        </div>
    </nav>

    <main class="max-w-md mx-auto mt-12 p-6">
        <div class="bg-white rounded-3xl shadow-xl border border-slate-100 p-8">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center text-2xl mx-auto mb-4">
                    <i class="fa-solid fa-lock"></i>
                </div>
                <h2 class="text-2xl font-black text-slate-900">Update Password</h2>
                <p class="text-sm text-slate-500">Ensure your account stays secure</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">New Password</label>
                    <input type="password" id="newPassword" placeholder="••••••••" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Confirm New Password</label>
                    <input type="password" id="confirmPassword" placeholder="••••••••" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>

                <div class="pt-6 flex gap-3">
                    <button onclick="window.location.href='navigation.html'" class="flex-1 py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold hover:bg-slate-200 transition-all">
                        Discard
                    </button>
                    <button onclick="updatePassword()" class="flex-[2] py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all">
                        Save Changes
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = 'https://vxzixltgnuvximbbttxx.supabase.co';
        const SB_KEY = 'sb_publishable_TyLXdjnySjpRxUS-vBk3MQ_mAq1UELd';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        async function updatePassword() {
            const pass = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (!pass || pass.length < 6) { alert("Password must be at least 6 characters."); return; }
            if (pass !== confirm) { alert("Passwords do not match."); return; }

            const { error } = await supabaseClient.auth.updateUser({ password: pass });

            if (error) {
                alert("Error: " + error.message);
            } else {
                alert("Password updated successfully!");
                window.location.href = 'navigation.html';
            }
        }
    </script>
</body>
</html>
