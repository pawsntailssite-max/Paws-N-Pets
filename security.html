<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Settings | PAWS-N-TAILS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <nav class="bg-white border-b border-slate-200 px-4 py-2 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="./Logo.jpg" alt="Logo" class="w-10 h-10 object-contain" onerror="this.src='https://via.placeholder.com/40'">
                <span class="text-lg font-black text-slate-900 uppercase">Paws & Tails</span>
            </div>
            <button onclick="window.location.href='navigation.html'" class="text-sm font-bold text-slate-600 hover:text-blue-600">
                <i class="fa-solid fa-arrow-left"></i> Back to Home
            </button>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto p-6 md:p-12">
        <div class="bg-white rounded-3xl shadow-xl border border-slate-100 p-8">
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
                <i class="fa-solid fa-shield-halved text-blue-600"></i> Security Settings
            </h2>

            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">New Password</label>
                    <input type="password" id="newPassword" placeholder="••••••••" class="w-full p-3 bg-slate-50 border rounded-xl font-semibold mt-1">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Confirm New Password</label>
                    <input type="password" id="confirmPassword" placeholder="••••••••" class="w-full p-3 bg-slate-50 border rounded-xl font-semibold mt-1">
                </div>
                <button onclick="updatePassword()" id="passBtn" class="w-full py-4 bg-slate-900 text-white font-black rounded-2xl shadow-xl uppercase hover:bg-slate-800 transition-all">
                    Update Password
                </button>
            </div>

            <hr class="my-10 border-slate-100">

            <div class="bg-blue-50 p-6 rounded-2xl">
                <h3 class="font-bold text-blue-900 mb-2">Two-Factor Authentication</h3>
                <p class="text-sm text-blue-700">Enhanced security for your account is currently managed via your registered email provider.</p>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = 'https://vxzixltgnuvximbbttxx.supabase.co';
        const SB_KEY = 'sb_publishable_TyLXdjnySjpRxUS-vBk3MQ_mAq1UELd';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        async function updatePassword() {
            const pass = document.getElementById('newPassword').value;
            const conf = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('passBtn');

            if (pass !== conf) return alert("Passwords do not match!");
            if (pass.length < 6) return alert("Password must be at least 6 characters.");

            btn.disabled = true;
            btn.innerText = "UPDATING...";

            const { error } = await supabaseClient.auth.updateUser({ password: pass });

            if (error) {
                alert("Error: " + error.message);
            } else {
                alert("Password updated successfully!");
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';
            }
            btn.disabled = false;
            btn.innerText = "Update Password";
        }
    </script>
</body>
</html>
