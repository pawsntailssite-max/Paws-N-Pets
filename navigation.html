<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal | PAWS-N-TAILS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* This ensures the page is visible immediately to prevent "loading loops" */
        body { display: block; } 
        .dropdown-content { display: none; }
        .dropdown-content.show { display: block; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <nav class="bg-white border-b border-slate-200 px-4 py-2 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            
            <div class="flex items-center gap-3">
                <img src="./Logo.jpg" alt="Logo" class="w-10 h-10 object-contain" onerror="this.src='https://via.placeholder.com/40'">
                <span class="text-lg font-black tracking-tighter text-slate-900 hidden sm:block">PAWS-N-TAILS</span>
            </div>

            <div class="flex items-center gap-1">
                <div class="relative">
                    <button onclick="toggleDropdown()" class="flex items-center gap-2 px-4 py-2 rounded-lg hover:bg-slate-100 font-bold text-sm text-slate-600 transition-colors">
                        <i class="fa-solid fa-gauge-high"></i> Dashboard <i class="fa-solid fa-chevron-down text-[10px]"></i>
                    </button>
                    <div id="dashboardDropdown" class="dropdown-content absolute left-0 mt-2 w-48 bg-white border border-slate-200 rounded-xl shadow-xl py-2 z-50">
                        <a href="dashboard.html" class="block px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-blue-50 hover:text-blue-600">
                            <i class="fa-solid fa-user-circle mr-2"></i> User Profile
                        </a>
                        <a href="security.html" class="block px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-blue-50 hover:text-blue-600">
                            <i class="fa-solid fa-shield-halved mr-2"></i> Security
                        </a>
                    </div>
                </div>

                <a id="adminNavLink" href="admin.html" class="hidden flex items-center gap-2 px-4 py-2 rounded-lg hover:bg-purple-50 text-purple-600 font-bold text-sm transition-colors">
                    <i class="fa-solid fa-unlock-keyhole"></i> Admin Panel
                </a>

                <button onclick="handleLogout()" class="flex items-center gap-2 px-4 py-2 rounded-lg hover:bg-red-50 text-red-500 font-bold text-sm transition-colors">
                    <i class="fa-solid fa-right-from-bracket"></i> Logout
                </button>
            </div>

            <div class="flex items-center gap-3 border-l pl-4 border-slate-100">
                <div class="text-right hidden md:block">
                    <p id="userBusinessName" class="text-xs font-black text-slate-900 uppercase truncate max-w-[150px]">Loading...</p>
                    <p class="text-[9px] font-bold text-blue-500 uppercase tracking-widest">Active Member</p>
                </div>
                <img id="userProfilePic" src="" class="w-9 h-9 rounded-full border-2 border-white shadow-sm object-cover" onerror="this.src='https://via.placeholder.com/150'">
            </div>

        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-12 text-center">
        <div class="py-20">
            <div class="inline-block p-4 bg-blue-50 rounded-full text-blue-600 mb-6">
                <i class="fa-solid fa-paw text-4xl"></i>
            </div>
            <h2 class="text-4xl font-extrabold text-slate-900 mb-4">Welcome to the Hub</h2>
            <p class="text-slate-500 text-lg">Your portal is ready. Use the menu above to manage your profile or security.</p>
        </div>
    </main>

    <script>
        const SB_URL = 'https://vxzixltgnuvximbbttxx.supabase.co';
        const SB_KEY = 'sb_publishable_TyLXdjnySjpRxUS-vBk3MQ_mAq1UELd';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        async function initPortal() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) { window.location.replace("index.html"); return; }

            const { data: profile } = await supabaseClient
                .from('applications')
                .select('*')
                .eq('email', user.email)
                .single();

            if (profile) {
                document.getElementById('userBusinessName').innerText = profile.clinic_name || 'Individual';
                document.getElementById('userProfilePic').src = profile.profile_url || 'https://via.placeholder.com/150';
                
                if (profile.user_type === 'admin' && (profile.status || '').toLowerCase() === 'approved' && profile.is_active) {
                    document.getElementById('adminNavLink').classList.remove('hidden');
                }
            }
        }

        function toggleDropdown() { document.getElementById('dashboardDropdown').classList.toggle('show'); }
        window.onclick = function(event) {
            if (!event.target.closest('.relative')) {
                const dropdowns = document.getElementsByClassName("dropdown-content");
                for (let i = 0; i < dropdowns.length; i++) { dropdowns[i].classList.remove('show'); }
            }
        }
        async function handleLogout() { await supabaseClient.auth.signOut(); window.location.replace("index.html"); }
        initPortal();
    </script>
</body>
</html>
